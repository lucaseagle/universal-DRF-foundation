name: Main CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_READONLY: "true"
      USE_SQLITE_FOR_TESTS: "true"
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Export app metadata
        run: python .github/scripts/export_meta.py >> "$GITHUB_ENV"

      - name: Setup uv (with built-in cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      - name: Crucial CI Steps
        run: make ci

      - name: Generate OpenAPI schema
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          COMMIT: ${{ env.COMMIT }}
        run: uv run python src/manage.py spectacular --file openapi/schema.yaml

      - name: Verify OpenAPI schema is up-to-date
        run: python .github/scripts/check_schema.py

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi/schema.yaml

      - name: Run Schemathesis
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          COMMIT: ${{ env.COMMIT }}
        run: uv run --extra dev python .github/scripts/run_schemathesis.py

  container-checks:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create .env from template
        run: cp .env.example .env

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          tags: test-api
          load: true

      - name: Docker Compose validation
        run: docker compose config

      # - name: Smoke test for docker compose up and down
      #   run: |
      #     make dev-up
      #     sleep 15
      #     docker compose ps
      #     make dev-down
