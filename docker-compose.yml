name: drf-api-template

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: >
      sh -c "python src/manage.py migrate --noinput &&
             python src/manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./.env
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
      - ./Makefile:/app/Makefile:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
